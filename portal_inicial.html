<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecione o certame desejado</title>
    <link rel="icon"
        href="https://statics.recife.pe.gov.br/images/dynamics/conecta/icons/favicon.png?w=32&h=32&fit=fill&border=2,transparent,shrink" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #0053a4;
            --brand-secondary: #003a73;
            --brand-highlight: #00a3ff;
            --surface: #f4f7fb;
            --surface-strong: #ffffff;
            --text-strong: #1b263b;
            --text-muted: #5b6c8c;
        }

        body {
            font-family: "Public Sans", sans-serif;
            background: linear-gradient(135deg, #0053a4 0%, #00a3ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: url("https://statics.recife.pe.gov.br/images/dynamics/automacao/header.png?w=3000") center/cover no-repeat;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }

        .modal-content {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 1060;
        }

        .modal-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 2rem 2rem 1rem;
            justify-content: center;
        }

        .modal-title {
            font-weight: 700;
            color: var(--brand-secondary);
            font-size: 1.5rem;
            text-align: center;
            width: 100%;
        }

        .modal-body {
            padding: 1rem 2rem 2.5rem;
        }

        .selection-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            width: 100%;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 83, 164, 0.12);
            border-radius: 1rem;
            background: #ffffff;
            color: var(--text-strong) !important;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
            text-decoration: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            cursor: pointer;
        }

        .selection-btn:last-child {
            margin-bottom: 0;
        }

        .selection-btn .selection-name {
            font-size: 1.05rem;
            line-height: 1.3;
            display: block;
        }

        .selection-btn .selection-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--brand-primary);
            background: rgba(0, 83, 164, 0.08);
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            margin-top: 0.2rem;
        }

        .selection-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: var(--brand-primary);
            color: #ffffff !important;
            border-color: var(--brand-primary);
        }

        .selection-btn:hover .selection-tag {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        /* Disabled selection styling */
        .selection-btn.disabled-selection {
            background: #f1f3f5;
            color: var(--text-muted) !important;
            border-color: rgba(0, 0, 0, 0.05);
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.8;
            box-shadow: none;
            transform: none !important;
        }

        .selection-btn.disabled-selection .selection-tag {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-muted) !important;
        }

        .modal-branding {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-branding img {
            height: 42px;
            margin-bottom: 0.5rem;
        }

        .modal-branding span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="bg-overlay"></div>

    <!-- n8n Variables - To be populated by n8n -->
    <div id="n8n-data" style="display: none;">
        <input type="hidden" id="token" value="{{ $('Code in JavaScript12').item.json.token }}" />
    </div>

    <div class="modal fade" id="selectionModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="selectionModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="w-100">
                        <div class="modal-branding">
                            <img src="https://statics.recife.pe.gov.br/images/dynamics/conecta/icons/favicon.png"
                                alt="Logo Recife">
                            <span>Secretaria de Administração - SAD</span>
                        </div>
                        <h5 class="modal-title" id="selectionModalLabel">Selecione o certame desejado</h5>
                    </div>
                </div>
                <div class="modal-body">
                    <div id="loading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p class="text-muted mt-2 small">Buscando processos seletivos...</p>
                    </div>
                    <div id="selection-list" class="d-none"></div>
                    <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modalEl = document.getElementById('selectionModal');
            const selectionModal = new bootstrap.Modal(modalEl);
            const selectionList = document.getElementById('selection-list');
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('error-message');

            selectionModal.show();

            const API_URL = 'https://webhook-n8n-dev-conectarecife.recife.pe.gov.br/webhook/selecoes-disponiveis';

            fetch(API_URL)
                .then(res => {
                    if (!res.ok) throw new Error('Falha na comunicação com o servidor.');
                    return res.json();
                })
                .then(data => {
                    console.log('Certames:', data);
                    loading.classList.add('d-none');
                    selectionList.classList.remove('d-none');

                    if (!Array.isArray(data) || data.length === 0) {
                        showError("Nenhuma seleção disponível no momento.");
                        return;
                    }

                    data.forEach(item => {
                        // Apenas status "Ativo"
                        const status = (item.status || item.selecao || '').trim();
                        if (status !== "Ativo") return;

                        // Oculta certames ainda sem edital publicado
                        const stage = (item.etapa_atual || '').toLowerCase().trim();
                        if (stage === "aguardando publicação de edital") return;

                        const btn = document.createElement('a');
                        btn.href = '#';
                        btn.className = 'selection-btn';

                        // Rótulo (Campo 'nome' conforme API real)
                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'selection-name';
                        nameSpan.textContent = item.nome || item.selecao || "Seleção sem título";
                        btn.appendChild(nameSpan);

                        // Tag da Etapa
                        if (item.etapa_atual) {
                            const tagSpan = document.createElement('span');
                            tagSpan.className = 'selection-tag';
                            tagSpan.textContent = `Etapa atual: ${item.etapa_atual}`;
                            btn.appendChild(tagSpan);
                        }

                        if (!isWaiting) {
                            btn.addEventListener('click', (e) => {
                                e.preventDefault();
                                handleRedirect(item.id);
                            });
                        }

                        selectionList.appendChild(btn);
                    });
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    loading.classList.add('d-none');
                    showError("Ocorreu um erro ao carregar as seleções. Tente novamente em instantes.");
                });

            function handleRedirect(id) {
                try {
                    const btns = document.querySelectorAll('.selection-btn');
                    btns.forEach(b => b.style.opacity = '0.5');

                    // Collect all n8n data from hidden inputs
                    const params = new URLSearchParams();
                    params.set('id', id);

                    const n8nInputs = document.querySelectorAll('#n8n-data input[type="hidden"]');
                    n8nInputs.forEach(input => {
                        const val = (input.value || "").trim();

                        // Capture all non-empty values that are not raw n8n placeholders
                        if (val && !val.startsWith('{{')) {
                            params.set(input.id, val);
                        }
                    });

                    const redirectUrl = `https://sad.recife.pe.gov.br/portal-certame?${params.toString()}`;
                    window.location.href = redirectUrl;
                } catch (err) {
                    console.error('Erro no redirecionamento:', err);
                    // Fallback para não travar o usuário
                    window.location.href = `https://sad.recife.pe.gov.br/portal-certame?id=${id}`;
                }
            }

            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
